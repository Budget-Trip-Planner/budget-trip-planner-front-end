<div class="trip-card-container" (click)="onTripClick()">
  <img [src]="coverImageUrl" [alt]="destinationLabel" class="trip-image">
  <div class="trip-info">
    <h3 class="trip-destination">{{ destinationLabel }}</h3>
    <div class="trip-details">
      <span class="trip-year">{{ trip.startDate | date: 'y' }}</span>
      <span class="trip-price">{{ trip.budgetTotal }}€</span>
    </div>
  </div>
</div>
