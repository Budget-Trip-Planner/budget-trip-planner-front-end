<div class="contact-container">
  <div class="contact-card">
    <div class="contact-header">
      <h2 class="contact-title">Contactez-nous</h2>
      <p class="contact-subtitle">
        Une question ? Notre équipe est là pour vous aider dans l’organisation de votre voyage.
      </p>
    </div>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">

      <div class="form-row">
        <div class="form-group">
          <label>Nom Complet <span class="required">*</span></label>
          <input type="text" formControlName="fullName" placeholder="John Doe">
        </div>

        <div class="form-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" formControlName="email" placeholder="john.doe@example.com">
        </div>
      </div>

      <div class="form-group">
        <label>Sujet <span class="required">*</span></label>
        <input type="text" formControlName="subject" placeholder="Ex: Problème avec ma réservation">
      </div>

      <div class="form-group">
        <label>Message <span class="required">*</span></label>
        <textarea rows="5" formControlName="message" placeholder="Décrivez votre demande ici..."></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" class="submit-button" [disabled]="isSending || contactForm.invalid">
          {{ isSending ? 'Envoi en cours...' : 'Envoyer le message' }}
        </button>
      </div>

      <div class="success-banner" *ngIf="successMessage">
        <span class="icon">✅</span>
        <p>{{ successMessage }}</p>
      </div>

    </form>
  </div>
</div>
