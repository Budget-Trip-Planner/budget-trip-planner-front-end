<div *ngIf="trip as t" class="dashboard">
  <header class="header" [ngStyle]="{ background: headerBackground }">
    <a [routerLink]="backRoute" class="back-btn"><- Retour</a>

    <h1>{{ t.destination }} - {{ t.duree }} jours - {{ t.budget }}€</h1>
    <p>{{ t.description }}</p>
  </header>

  <main class="content">
    <section class="budget-card">
      <h2>Repartition du budget</h2>
      <div class="chart" [ngStyle]="{ background: chartGradient }">
        {{ t.budget }} €
      </div>

      <div class="legend">
        <div *ngFor="let item of t.repartition" class="legend-item">
          <span class="color" [ngStyle]="{ background: item.couleur }"></span>
          {{ item.label }} - {{ item.montant }} €
        </div>
      </div>

      <div>
        <h2>Hotel</h2>
        <div class="legend-item">
          {{ t.hotel }}
        </div>
      </div>
    </section>

    <section class="days">
      <div *ngFor="let jour of t.jours" class="day-card">
        <h3>{{ jour.titre }}</h3>
        <p>{{ jour.activites.join(' • ') }}</p>
      </div>
    </section>
  </main>

  <div class="actions">
    <button class="save" (click)="saveTrip()" [disabled]="!canSave || isSaving">
      {{ isSaving ? 'Enregistrement...' : 'Enregistrer' }}
    </button>
    <button class="share">Partager</button>
    <p *ngIf="saveError" class="save-error">{{ saveError }}</p>
  </div>
</div>
