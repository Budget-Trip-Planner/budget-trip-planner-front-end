<div class="signup-container">
  <form [formGroup]="form" (ngSubmit)="submit()" class="signup-card">
    <div class="header">
      <div class="icon">✈️</div>
      <h2>Rejoignez la communauté des voyageurs</h2>
    </div>

    <div class="fields">
      <input type="text" formControlName="firstName" placeholder="Prénom" required />
      <input type="text" formControlName="lastName" placeholder="Nom" required />
      <input type="text" formControlName="username" placeholder="Nom d’utilisateur" required /> <!-- ✅ -->
      <input type="email" formControlName="email" placeholder="Email" required />

      <input type="password" formControlName="password" placeholder="Mot de passe" required />
      <input type="password" formControlName="confirm" placeholder="Confirmer le mot de passe" required />
    </div>

    <button type="submit" [disabled]="loading">Créer mon compte</button>

    <p *ngIf="error" style="color:#ff6f00;">{{ error }}</p>

    <p class="login-link">
      Déjà inscrit ? <a routerLink="/auth/login">Connectez-vous</a>
    </p>
  </form>
</div>
