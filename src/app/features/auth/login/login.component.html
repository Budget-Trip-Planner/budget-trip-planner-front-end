<h1>Sign in</h1>
<form [formGroup]="form" (ngSubmit)="submit()">
  <label>Email</label>
  <input type="email" formControlName="email" />
  <small *ngIf="form.controls.email.touched && form.controls.email.invalid">Email invalide</small>

  <label>Mot de passe</label>
  <input type="password" formControlName="password" />
  <small *ngIf="form.controls.password.touched && form.controls.password.invalid">Min 6 caractères</small>

  <button type="submit" [disabled]="loading">Se connecter</button>
  <p *ngIf="error">{{ error }}</p>
</form>
<p>Pas de compte ? <a routerLink="/auth/register">Créer un compte</a></p>
