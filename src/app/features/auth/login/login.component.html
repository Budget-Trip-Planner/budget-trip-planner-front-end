<div class="signin-container">
  <div class="overlay">
    <div class="signin-box">
      <div class="header">
        <img src="/voyage 1.png" alt="Icône voyage" class="header-icon" />
        <h2>Planifiez votre voyage de rêve<br />selon votre budget</h2>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="signin-form">
        <h3>Bienvenue</h3>

        <input
          type="email"
          formControlName="email"
          placeholder="Email"
          required
        />
        <input
          type="password"
          formControlName="password"
          placeholder="Password"
          required
        />

        <button type="submit" [disabled]="loading">Se connecter</button>

        <p class="signup-link">
          Pas encore inscrit ? 
           <a routerLink="/auth/register">Créez un compte</a>
        </p>

        <p *ngIf="error" style="color: #ff6f00;">{{ error }}</p>
      </form>
    </div>
  </div>
</div>
