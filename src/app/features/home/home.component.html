<div class="home-container">
    <nav class="navbar">
      <div class="nav-left">
        <img src="en-voyageant.png" alt="Logo" class="nav-logo" />
        <span class="text-v">Voyageur</span>
      </div>
      <div class="nav-right">
        <img src="profile-icon.png" alt="Profil" class="profile-icon" />
      </div>
    </nav>
  
    <div class="home-content">
      <div class="home-card">
        <div class="home-title">
          <h2 class="text-title">Planifiez votre voyage selon votre budget</h2>
          <img src="home-plane.png" alt="Plane" class="home-plane" />
        </div>
  
        <form class="trip-form">
            <div class="form-row">
                <div class="form-group">
                  <label>Budget <span class="required">*</span></label>
                  <div class="input-wrapper">
                    <input type="number" placeholder="1000" />
                    <span class="suffix">€</span>
                  </div>
                </div>
              
                <div class="form-group">
                  <label>Durée (jours) <span class="required">*</span></label>
                  <input type="number" placeholder="7" />
                </div>
              </div>
              
  
          <div class="form-group">
            <label>Ville de départ <span class="required">*</span></label>
            <div class="input-wrapper left-icon">
                <img src="location.png" class="input-icon" alt="location" />
              <input type="text" placeholder="Paris" />
            </div>
          </div>
  
          <div class="form-group">
            <label>Date de départ</label>
            <div class="input-wrapper left-icon">
              <img src="calendar.png" class="input-icon" alt="calendar" />
              <input type="text" placeholder="jj/mm/aa" />
            </div>
          </div>
          
  
          <div class="preferences">
            <label>Préférences</label>
            <div class="tags">
              <span class="tag tag-blue">Plage</span>
              <span class="tag tag-green">Nature</span>
              <span class="tag tag-yellow">Culture</span>
              <span class="tag tag-orange">Gastronomie</span>
              <span class="tag tag-purple">Shopping</span>
              <span class="tag tag-red">Aventure</span>
              <span class="tag tag-teal">Bien-être</span>
              <span class="tag tag-brown">Histoire</span>
              <span class="tag tag-pink">Romantique</span>
              <span class="tag tag-gray">Affaires</span>
              <span class="tag tag-cyan">Croisière</span>
              <span class="tag tag-gold">Luxe</span>
              <span class="tag tag-lime">Famille</span>
              <span class="tag tag-indigo">Festivals</span>
              <span class="tag tag-silver">Sport</span>
            </div>
          </div>
  
          <button type="button" class="btn-primary">Créer mon voyage</button>
        </form>
      </div>
    </div>
  </div>
