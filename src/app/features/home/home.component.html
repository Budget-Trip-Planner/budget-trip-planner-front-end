<div class="home-container">
  <!-- L'ancienne navbar a été supprimée, le MainLayout s'en occupe maintenant -->

  <div class="home-content">
    <div class="home-card">
      <div class="home-title">
        <h2 class="text-title">Planifiez votre voyage selon votre budget</h2>
        <img src="home-plane.png" alt="Plane" class="home-plane" />
      </div>

      <form class="trip-form">
        <div class="form-row">
          <div class="form-group">
            <label>Budget <span class="required">*</span></label>
            <div class="input-wrapper">
              <input type="number" placeholder="1000" name="budget" [(ngModel)]="budget" required />
              <span class="suffix">€</span>
            </div>
          </div>

          <div class="form-group">
            <label>Durée (jours) <span class="required">*</span></label>
            <input type="number" placeholder="7" name="duration" [(ngModel)]="duration" required />
          </div>
        </div>

        <div class="form-group">
          <label>Ville de départ <span class="required">*</span></label>
          <div class="input-wrapper left-icon">
            <img src="location.png" class="input-icon" alt="location" />
            <input type="text" placeholder="Paris" name="departureCity" [(ngModel)]="departureCity" required />
          </div>
        </div>

        <div class="form-group">
          <label>Date de départ</label>
          <div class="input-wrapper date-icon">
            <input type="date" [(ngModel)]="startDate" name="startDate" placeholder="jj/mm/aa" />
          </div>
        </div>

        <div class="preferences">
          <label>Préférences</label>
          <div class="tags">
            <span *ngFor="let pref of preferences" (click)="togglePreference(pref)"
                  [class.selected]="selectedPreferences.includes(pref)"
                  class="tag"
                  [ngClass]="getTagColor(pref)">
              {{pref}}
            </span>
          </div>
          <div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
          </div>
        </div>

        <button type="button" class="btn-primary" (click)="createTrip()">Créer mon voyage</button>
      </form>
    </div>
  </div>
</div>
