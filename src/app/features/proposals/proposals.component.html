<div class="proposals-container">
  <nav class="navbar">
    <div class="nav-left">
      <img src="en-voyageant.png" alt="Logo" class="nav-logo" />
      <span class="text-v">Voyageur</span>
    </div>

    <div class="nav-right">
      <img src="profile-icon.png" alt="profil" class="profile-icon" (click)="goToProfile()" />
    </div>
  </nav>

  <div class="proposals-content">
    <div class="title">
      <span class="text-title">Nos propositions de voyage</span>
      <img src="home-plane.png" alt="plane" class="proposals-plane" />
    </div>

    <div *ngIf="missingStateMessage" class="empty-state">
      <p>{{ missingStateMessage }}</p>
      <button type="button" class="btn-home" (click)="goHome()">Créer un voyage</button>
    </div>

    <div class="trip-list" *ngIf="trips.length">
      <div class="trip-card" *ngFor="let trip of trips">
        <img
          [src]="trip.image || 'https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Collage_Rome.jpg/1280px-Collage_Rome.jpg'"
          [alt]="trip.destination || 'destination'"
          class="trip-image"
        />
        <div class="trip-information">
          <span class="trip-destination">{{ trip.destination }}</span>
          <span class="trip-duration">Durée : {{ trip.durationDays }} jours</span>
          <span class="trip-budget">Coût estimé : {{ trip.estimatedCost || 0 }} €</span>
          <button class="btn-select" type="button" (click)="selectTrip(trip)">
            Sélectionner cette destination
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
