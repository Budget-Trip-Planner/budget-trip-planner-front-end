<div class="profile-form" *ngIf="user">

  <div class="user-header">

    <div class="avatar-container" (click)="fileInput.click()">
      <img
        [src]="user.imageUrl ? user.imageUrl : defaultAvatar"
        alt="Avatar"
        class="avatar"
      >
      <div class="avatar-overlay">
        <svg class="edit-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
      </div>
    </div>
    <input
      type="file"
      #fileInput
      (change)="onFileSelected($event)"
      accept="image/png, image/jpeg"
      style="display: none;"
    >

    <h3>{{ user.firstName }} {{ user.lastName }}</h3>
    <p class="subtitle">Membre depuis 2025</p>
  </div>

  <form (ngSubmit)="onSubmit()" #profileForm="ngForm">

    <div class="form-group">
      <label for="mail">Email</label>
      <input id="mail" type="email" name="mail" [(ngModel)]="user.mail" placeholder="sophie.dubois@gmail.com">
    </div>


    <div class="form-group">
      <label for="lastName">Nom</label>
      <input id="lastName" type="text" name="lastName" [(ngModel)]="user.lastName" placeholder="Dubois">
    </div>
    <div class="form-group">
      <label for="firstName">Prénom</label>
      <input id="firstName" type="text" name="firstName" [(ngModel)]="user.firstName" placeholder="Sophie">
    </div>


    <div class="form-group">
      <label for="username">Nom d'utilisateur</label>
      <input id="username" type="text" name="username" [(ngModel)]="user.username" placeholder="Dubois5">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="birthday">Date de naissance</label>
        <input id="birthday" type="text" name="birthday" [(ngModel)]="user.birthday" placeholder="jj/mm/aaaa">
      </div>
      <div class="form-group">
        <label for="country">Pays</label>
        <input id="country" type="text" name="country" [(ngModel)]="user.location.country" placeholder="France">
      </div>
    </div>

    <div class="form-group">
      <label for="city">Ville</label>
      <input id="city" type="text" name="city" [(ngModel)]="user.location.city" placeholder="Paris">
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="!profileForm.valid">Enregistrer</button>
    </div>

  </form>
</div>
