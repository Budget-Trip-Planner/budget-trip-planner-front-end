<form *ngIf="user" #profileForm="ngForm" (ngSubmit)="onSubmit()" class="profile-form">

  <div class="user-header">
    <img src="assets/profile-icon.png" alt="Avatar" class="avatar">
    <h3>{{ user.firstName + ' ' + user.lastName || 'Votre Nom' }}</h3>
    <p class="subtitle">Membre depuis 2025</p>
  </div>

  <div class="form-group">
    <label for="email">Email</label>
    <input id="email"
           type="email"
           [(ngModel)]="user.mail"
           name="email"
           placeholder="sophie.dubois@gmail.com"
           required>
  </div>

  <div class="form-group">
    <label for="nom">Nom</label>
    <input id="nom"
           type="text"
           [(ngModel)]="user.lastName"
           name="nom"
           placeholder="Dubois"
           required>
  </div>
  <div class="form-group">
    <label for="prenom">Prénom</label>
    <input id="prenom"
           type="text"
           [(ngModel)]="user.firstName"
           name="prenom"
           placeholder="Sophie"
           required>
  </div>

  <div class="form-group">
    <label for="nomUtilisateur">Nom d'utilisateur</label>
    <input id="nomUtilisateur"
           type="text"
           [(ngModel)]="user.username"
           name="nomUtilisateur"
           placeholder="Dubois5"
           required>
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="dateNaissance">Date de naissance</label>
      <input id="dateNaissance"
             type="text"
             placeholder="jj/mm/aaaa"
             [(ngModel)]="user.birthday"
             name="dateNaissance">
    </div>
    <div class="form-group">
      <label for="pays">Pays</label>
      <input id="pays"
             type="text"
             [(ngModel)]="user.location.country"
             placeholder="France"
             name="pays">
    </div>
  </div>

  <div class="form-group">
    <label for="ville">Ville</label>
    <input id="ville"
           type="text"
           [(ngModel)]="user.location.city"
           placeholder="Paris"
           name="ville">
  </div>

  <div class="form-actions">
    <button type="submit" class="btn-primary" [disabled]="!profileForm.form.valid">
      Enregistrer
    </button>
  </div>

</form>
