<div class="history-container">
  <div class="user-header">
    <h3>Mes Voyages</h3>
    <p class="subtitle">Retrouvez ici tous vos futurs souvenirs</p>
  </div>

  <div class="content-scroll">
    <h2 class="page-title">À venir</h2>

    <div class="trips-grid">

      @if (futurTrips$ | async; as futurTrips) {

        @for (trip of futurTrips; track trip.id) {
          <app-trip-card
            [trip]="trip"
            (tripClick)="openTripDetails($event)">
          </app-trip-card>
        } @empty {
          <div class="empty-state">
            <p>Vous n'avez pas/plus de voyages à venir.</p>
          </div>
        }

      } @else {
        <div class="empty-state">
          <p>Chargement...</p>
        </div>
      }

    </div>
  </div>
</div>
